<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax Calculator</title>
  <style>
    .tax-calculator {
      background: #FBE8A6;
      padding: 20px 30px;
      max-width: 900px;
      margin: 20px auto;
      font-family: 'Poppins', sans-serif;
    }

    .tax-calculator h2 {
      color: #1c1c1c;
      font-size: 40px;
      margin-bottom: 30px;
      text-align: center;
    }

    /* Input Grid for Income + Year */
    .input-grid {
      display: grid;
      grid-template-columns: 2fr 1fr; /* income wider than year */
      gap: 20px;
      margin-bottom: 20px;
    }

    .input-field label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1c1c1c;
    }

    .input-field input,
    .input-field select {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      border: 1px solid #ccc;
    }

    /* Slider */
    .tax-calculator input[type="range"] {
      width: 100%;
      margin: 20px 0;
      accent-color: #ef4444;
    }

    /* Results grid */
    .results {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-top: 20px;
    }

    .result-box {
      flex: 1;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e5e5e5;
    }

    .result-box strong {
      display: block;
      color: #1c1c1c;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .result-box span {
      color: #111;
      font-weight: 600;
      font-size: 18px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .tax-calculator {
        max-width: 95%;
        padding: 15px;
      }
      .results {
        flex-wrap: wrap;
        justify-content: center;
      }
      .result-box {
        flex: 1 1 45%;
        min-width: 140px;
        margin-bottom: 10px;
      }
    }

    @media (max-width: 500px) {
      .input-grid {
        grid-template-columns: 1fr;
      }
      .result-box {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <div class="tax-calculator">
    <h2>Income Tax Calculator</h2>

    <!-- Income + Year in one line -->
    <div class="input-grid">
      <div class="input-field">
        <label for="income">Enter Gross Income (Monthly)</label>
        <input type="number" id="income" value="0" min="0" max="1000000" step="1000" oninput="syncSlider(this.value)" />
      </div>

      <div class="input-field">
        <label for="year">Year</label>
        <select id="year" onchange="calculateTax()">
          <option value="2025">2025 - 2026</option>
          <option value="2024">2024 - 2025</option>
        </select>
      </div>
    </div>

    <!-- Slider -->
    <input type="range" id="incomeSlider" min="0" max="1000000" step="1000" value="0" oninput="syncInput(this.value)" />

    <!-- Results -->
    <div class="results">
      <div class="result-box"><strong>Monthly Tax</strong><br>Rs <span id="monthlyTax">0</span></div>
      <div class="result-box"><strong>Salary After Tax</strong><br>Rs <span id="salaryAfter">0</span></div>
      <div class="result-box"><strong>Annual Tax</strong><br>Rs <span id="annualTax">0</span></div>
      <div class="result-box"><strong>Annual Salary</strong><br>Rs <span id="annualSalary">0</span></div>
    </div>
  </div>

  <script>
    function calculateTax() {
      let income = parseFloat(document.getElementById("income").value) || 0;
      let annualIncome = income * 12;
      let tax = 0;

      // Pakistan Income Tax Slabs FY 2025-26
      if (annualIncome <= 600000) {
        tax = 0;
      } else if (annualIncome <= 1200000) {
        tax = (annualIncome - 600000) * 0.01;
      } else if (annualIncome <= 2200000) {
        tax = 6000 + (annualIncome - 1200000) * 0.11;
      } else if (annualIncome <= 3200000) {
        tax = 116000 + (annualIncome - 2200000) * 0.23;
      } else {
        tax = 116000 + (1000000) * 0.23 + (annualIncome - 3200000) * 0.35;
      }

      // Update Results
      document.getElementById("annualTax").innerText = tax.toFixed(2);
      document.getElementById("monthlyTax").innerText = (tax / 12).toFixed(2);
      document.getElementById("annualSalary").innerText = annualIncome.toFixed(2);
      document.getElementById("salaryAfter").innerText = ((annualIncome - tax) / 12).toFixed(2);
    }

    function syncSlider(val) {
      document.getElementById("incomeSlider").value = val;
      calculateTax();
    }

    function syncInput(val) {
      document.getElementById("income").value = val;
      calculateTax();
    }

    // Run on load
    calculateTax();
  </script>
</body>
</html>
