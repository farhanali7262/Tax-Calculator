<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax & Zakat Calculator</title>
  <style>
    .tax-calculator {
      background: #fdf6e3; /* light cream */
      padding: 20px;
      border-radius: 12px;
      max-width: 700px;
      margin: auto;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tax-calculator h2 {
      color: #1c1c1c;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .tax-calculator h3 {
      margin-top: 20px;
      font-size: 20px;
      color: #111;
    }
    .tax-calculator label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
      color: #1c1c1c;
    }
    .tax-calculator input[type="number"],
    .tax-calculator select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
    }
    .tax-calculator input[type="range"] {
      width: 100%;
     
      height: 10px;
      border-radius: 5px;
      background: #ef4444;
      outline: none;
      margin: 20px 0;
    }
    .tax-calculator input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #1c1c1c;
      cursor: pointer;
      margin-top: -7px;
    }
    .results {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .result-box {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e5e5e5;
    }
    .result-box strong {
      display: block;
      color: #1c1c1c;
      margin-bottom: 5px;
      font-size: 16px;
    }
    .result-box span {
      color: #111;
      font-weight: 600;
      font-size: 18px;
    }
    .tax-summary {
      margin-top: 25px;
      background: #fff8dc;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #f0e68c;
      font-size: 15px;
      color: #1c1c1c;
      line-height: 1.6;
    }
    .tax-summary strong { color: #0e76bc; }
    #switchBtn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
<div class="tax-calculator" id="pk-tax-calc">
  <!-- Tax Calculator -->
  <div id="taxCalculator">
    <h2>Income Tax Calculator</h2>

    <label for="income">Enter Gross Income (Monthly)</label>
    <input type="number" id="income" value="0" min="0" max="1000000" step="1000">

    <label for="year">Year</label>
    <select id="year">
      <option value="2025" selected>2025 - 2026</option>
      <option value="2024">2024 - 2025</option>
    </select>

    <input type="range" id="incomeSlider" min="0" max="1000000" step="1000" value="0">

    <div class="results">
      <div class="result-box"><strong>Monthly Tax</strong><br>Rs <span id="monthlyTax">0</span></div>
      <div class="result-box"><strong>Salary After Tax</strong><br>Rs <span id="monthlyNet">0</span></div>
      <div class="result-box"><strong>Annual Tax</strong><br>Rs <span id="annualTax">0</span></div>
      <div class="result-box"><strong>Annual Salary</strong><br>Rs <span id="annualGross">0</span></div>
    </div>
    <div class="tax-summary" id="taxSummary"></div>
  </div>

  <!-- Zakat Calculator -->
  <div id="zakatCalculator" style="display:none;">
    <h2>Zakat Calculator</h2>

    <p><strong>Nisab Threshold</strong></p>
    <p>Gold: approx PKR 2,250,000 <br>Silver: approx PKR 175,000</p>

    <h3>Cash</h3>
    <label>Cash in hand & Bank</label>
    <input type="number" id="cashBank" value="0" min="0" step="1000">
    <label>Cash deposited (Hajj etc.)</label>
    <input type="number" id="cashDeposited" value="0" min="0" step="1000">
    <label>Cash given as loan</label>
    <input type="number" id="cashLoan" value="0" min="0" step="1000">
    <label>Investments, shares, savings certificates, bonds</label>
    <input type="number" id="investments" value="0" min="0" step="1000">

    <h3>Gold & Silver</h3>
    <label>Gold value (PKR)</label>
    <input type="number" id="gold" value="0" min="0" step="1000">
    <label>Silver value (PKR)</label>
    <input type="number" id="silver" value="0" min="0" step="1000">

    <h3>Trade Goods</h3>
    <label>Business Stock value</label>
    <input type="number" id="stock" value="0" min="0" step="1000">

    <h3>Liabilities</h3>
    <label>Borrowed money / loans</label>
    <input type="number" id="loanLiability" value="0" min="0" step="1000">
    <label>Wages due to employees</label>
    <input type="number" id="wages" value="0" min="0" step="1000">
    <label>Rent, utilities, bills due</label>
    <input type="number" id="bills" value="0" min="0" step="1000">

    <div class="results">
      <div class="result-box"><strong>Total Net Worth</strong><br>PKR <span id="netWorth">0</span></div>
      <div class="result-box"><strong>Zakat Payable</strong><br>PKR <span id="zakatAmount">0</span></div>
    </div>
    <div class="tax-summary" id="zakatSummary"></div>
  </div>

  <button id="switchBtn">Switch to Zakat Calculator</button>
</div>

<script>
(function () {
  const root = document.getElementById('pk-tax-calc');
  const incomeInput = root.querySelector('#income');
  const yearSelect  = root.querySelector('#year');
  const slider      = root.querySelector('#incomeSlider');
  const elMonthlyTax  = root.querySelector('#monthlyTax');
  const elMonthlyNet  = root.querySelector('#monthlyNet');
  const elAnnualTax   = root.querySelector('#annualTax');
  const elAnnualGross = root.querySelector('#annualGross');
  const elSummary     = root.querySelector('#taxSummary');

  const taxCalcDiv    = root.querySelector('#taxCalculator');
  const zakatCalcDiv  = root.querySelector('#zakatCalculator');
  const switchBtn     = root.querySelector('#switchBtn');

  const fmt0 = (n) => Number(n || 0).toLocaleString('en-PK', {maximumFractionDigits: 0});
  const fmt2 = (n) => Number(n || 0).toLocaleString('en-PK', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  function getAnnualTaxPK(annualIncome, year) {
    if (year === '2025') {
      if (annualIncome <= 600000) return 0;
      if (annualIncome <= 1200000) return (annualIncome - 600000) * 0.01;
      if (annualIncome <= 2200000) return 6000 + (annualIncome - 1200000) * 0.11;
      if (annualIncome <= 3200000) return 116000 + (annualIncome - 2200000) * 0.23;
      return 346000 + (annualIncome - 3200000) * 0.35;
    }
    if (year === '2024') {
      if (annualIncome <= 600000) return 0;
      if (annualIncome <= 1200000) return (annualIncome - 600000) * 0.05;
      if (annualIncome <= 2200000) return 30000 + (annualIncome - 1200000) * 0.15;
      if (annualIncome <= 3200000) return 180000 + (annualIncome - 2200000) * 0.25;
      if (annualIncome <= 4100000) return 430000 + (annualIncome - 3200000) * 0.30;
      return 700000 + (annualIncome - 4100000) * 0.35;
    }
    return 0;
  }

  function calculateTax() {
    const monthlyGross = Math.max(0, parseFloat(incomeInput.value) || 0);
    const annualGross  = monthlyGross * 12;
    const year         = yearSelect.value;
    const annualTax    = getAnnualTaxPK(annualGross, year);
    const monthlyTax   = annualTax / 12;
    const annualNet    = annualGross - annualTax;
    const monthlyNet   = annualNet / 12;

    elMonthlyTax.textContent  = fmt2(monthlyTax);
    elMonthlyNet.textContent  = fmt2(monthlyNet);
    elAnnualTax.textContent   = fmt2(annualTax);
    elAnnualGross.textContent = fmt0(annualNet);
    if (Number(slider.value) !== monthlyGross) slider.value = monthlyGross;

    elSummary.innerHTML = `📢 <strong>Tax Summary</strong> — With a <strong>monthly gross</strong> of Rs. ${fmt0(monthlyGross)} 
    (annual gross Rs. ${fmt0(annualGross)}), you’ll pay about <strong>Rs. ${fmt2(monthlyTax)}</strong> in tax each month 
    (Rs. ${fmt2(annualTax)} annually). Your <strong>net take-home</strong> is <strong>Rs. ${fmt2(monthlyNet)}</strong> per month 
    (Rs. ${fmt2(annualNet)} per year).`;
  }

  function calculateZakat() {
    const goldNisab   = 2250000;
    const silverNisab = 175000;
    const nisab = Math.min(goldNisab, silverNisab);

    const getVal = id => parseFloat(document.getElementById(id).value) || 0;
    const totalAssets = getVal("cashBank")+getVal("cashDeposited")+getVal("cashLoan")+getVal("investments")+getVal("gold")+getVal("silver")+getVal("stock");
    const totalLiab   = getVal("loanLiability")+getVal("wages")+getVal("bills");
    const netWorth    = totalAssets - totalLiab;

    let zakat = 0;
    if (netWorth >= nisab) zakat = netWorth * 0.025;

    document.getElementById("netWorth").textContent = fmt0(netWorth);
    document.getElementById("zakatAmount").textContent = fmt0(zakat);
    document.getElementById("zakatSummary").innerHTML = 
      `🕌 <strong>Zakat Summary</strong> — Net assets: PKR ${fmt0(netWorth)}<br>
       Nisab applied: PKR ${fmt0(nisab)}<br>
       Zakat payable: <strong>PKR ${fmt0(zakat)}</strong>`;
  }

  incomeInput.addEventListener('input', calculateTax);
  slider.addEventListener('input', (e) => { incomeInput.value = e.target.value; calculateTax(); });
  yearSelect.addEventListener('change', calculateTax);

  ["cashBank","cashDeposited","cashLoan","investments","gold","silver","stock","loanLiability","wages","bills"]
    .forEach(id => document.getElementById(id).addEventListener("input", calculateZakat));

  switchBtn.addEventListener('click', () => {
    if (taxCalcDiv.style.display !== 'none') {
      taxCalcDiv.style.display = 'none';
      zakatCalcDiv.style.display = 'block';
      switchBtn.textContent = "Switch to Tax Calculator";
    } else {
      taxCalcDiv.style.display = 'block';
      zakatCalcDiv.style.display = 'none';
      switchBtn.textContent = "Switch to Zakat Calculator";
    }
  });

  calculateTax();
  calculateZakat();
})();
</script>
</body>
</html>
